<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pía Vargas — UX/UI Designer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Courier+Prime:ital,wght@0,400;0,700;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet" />

  <style>
    /* ═══ TOKENS ═══ */
    :root {
      --black:    #000000; --white:    #FFFFFF;
      --red-dark: #BB2F2E; --red-pale: #C2463A; --pink: #E5AF9F;
      --grey-800: #2B2B2B; --grey-700: #3D3D3D; --grey-600: #555555;
      --grey-500: #A3A3A3; --grey-400: #B8B4B3; --grey-300: #C1BCBB;
      --grey-200: #E4DFDE; --grey-100: #E5E5E5;
      --bg: var(--white); --text: var(--grey-800);
      --muted: var(--grey-600); --accent: var(--red-dark); --border: var(--grey-200);
    }

    /* ═══ RESET ═══ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; scroll-behavior: smooth; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg); color: var(--text);
      line-height: 1.6; -webkit-font-smoothing: antialiased;
      transition: background 0.3s ease;
    }
    img, video { max-width: 100%; display: block; }
    button { cursor: pointer; font: inherit; border: none; background: none; }
    a { color: inherit; text-decoration: none; }
    ul, li { list-style: none; }

    /* ═══ BUTTONS ═══ */
    .btn-primary, .btn-ghost {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 13px 26px; font-family: 'DM Sans', sans-serif;
      font-size: 13px; font-weight: 500; text-transform: uppercase;
      letter-spacing: 1.5px; cursor: pointer;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
      border: 2px solid var(--black); text-decoration: none; white-space: nowrap;
    }
    .btn-primary { background: var(--black); color: var(--white); }
    .btn-primary:hover { background: var(--accent); border-color: var(--accent); }
    .btn-ghost { background: transparent; color: var(--black); }
    .btn-ghost:hover { background: var(--black); color: var(--white); }

    /* ═══ PAGE TRANSITION ═══ */
    @keyframes pageIn {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .page { animation: pageIn 0.38s cubic-bezier(0.22, 1, 0.36, 1); }

    /* ═══ MISC ANIMATIONS ═══ */
    @keyframes fadeIn {
      from { opacity: 0; } to { opacity: 1; }
    }
    @keyframes dumpIn {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes stripScroll {
      from { transform: translateX(0); }
      to   { transform: translateX(-50%); }
    }

    /* ═══ SCROLLBAR ═══ */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--grey-300); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--grey-500); }

    /* ═══ RESPONSIVE ≤768px ═══ */
    @media (max-width: 768px) {
      nav { padding: 0 20px !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js"
    integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
    crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
    integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
    crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
    integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
    crossorigin="anonymous"></script>

  <script src="js/content.js"></script>
  <script type="text/babel" src="js/Nav.jsx"></script>
  <script type="text/babel" src="js/Home.jsx"></script>
  <script type="text/babel" src="js/CaseStudy.jsx"></script>
  <script type="text/babel" src="js/About.jsx"></script>
  <script type="text/babel" src="js/DisasterDrawer.jsx"></script>
  <script type="text/babel" src="js/App.jsx"></script>
</body>
</html>
